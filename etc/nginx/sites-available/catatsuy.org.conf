server {
  listen 80;
  listen [::]:80;

  server_name catatsuy.org;
  root /home/www/catatsuy.org/;

  location / {
    return 301 https://catatsuy.org$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  listen 443 quic;
  listen [::]:443 quic;

  http2 on;

  server_name catatsuy.org;

  include conf.d/ssl.conf;

  add_header Strict-Transport-Security max-age=31536000;

  # サーバー証明書と秘密鍵を指定
  ssl_certificate     /home/www/lego/ecdsa/certificates/catatsuy.org.fullchain.pem;
  ssl_certificate_key /home/www/lego/ecdsa/certificates/catatsuy.org.key;
  ssl_certificate     /home/www/lego/rsa/certificates/catatsuy.org.fullchain.pem;
  ssl_certificate_key /home/www/lego/rsa/certificates/catatsuy.org.key;

  location / {
    rewrite ^(.*)$ https://www.catatsuy.org$1 permanent;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;

  http2 on;

  server_name ech.catatsuy.org;

  include conf.d/ssl.conf;
  include conf.d/spectre.conf;

  ssl_certificate     /home/www/lego/ecdsa/certificates/catatsuy.org.fullchain.pem;
  ssl_certificate_key /home/www/lego/ecdsa/certificates/catatsuy.org.key;
  ssl_certificate     /home/www/lego/rsa/certificates/catatsuy.org.fullchain.pem;
  ssl_certificate_key /home/www/lego/rsa/certificates/catatsuy.org.key;
}

